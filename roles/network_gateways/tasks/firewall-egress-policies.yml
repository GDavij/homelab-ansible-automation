---
- name: Setup Egress Rules using Direct.xml
  ansible.builtin.copy:
    src: firewall_direct.gateways.xml
    dest: /etc/firewalld/direct.xml
    owner: root
    group: root
    mode: '0640'
  become: true
  notify: Reload Firewalld (Network Gateways)
  tags:
    - network_gateways

- name: "Flush Handlers to Apply Egress Rules Immediately"
  ansible.builtin.meta: flush_handlers
  tags:
    - network_gateways
