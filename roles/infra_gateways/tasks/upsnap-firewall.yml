---
- name: Remove existing Upsnap rules from underlay_network zone
  ansible.posix.firewalld:
    zone: underlay_network
    rich_rule: "{{ item }}"
    state: disabled
    permanent: true
    immediate: true
  loop:
    - 'rule family="ipv4" source address="{{ docker_core_net_cidr }}" port port="8443" protocol="tcp" accept'
    - 'rule family="ipv4" source address="{{ docker_proxy_net_cidr }}" port port="8443" protocol="tcp" accept'
    - 'rule family="ipv4" port port="8443" protocol="tcp" reject'
    - 'rule family="ipv4" port port="8090" protocol="tcp" reject'
  failed_when: false
  become: true
  tags:
    - infra_gateways
    - upsnap
    - firewall

- name: Remove existing Upsnap rules from ztn_network zone
  ansible.posix.firewalld:
    zone: ztn_network
    rich_rule: "{{ item }}"
    state: disabled
    permanent: true
    immediate: true
  loop:
    - 'rule family="ipv4" source address="{{ docker_core_net_cidr }}" port port="8443" protocol="tcp" accept'
    - 'rule family="ipv4" source address="{{ docker_proxy_net_cidr }}" port port="8443" protocol="tcp" accept'
    - 'rule family="ipv4" port port="8443" protocol="tcp" reject'
    - 'rule family="ipv4" port port="8090" protocol="tcp" reject'
  failed_when: false
  become: true
  tags:
    - infra_gateways
    - upsnap
    - firewall

- name: Allow Traefik to access Upsnap proxy (8443) from Docker core network on underlay
  ansible.posix.firewalld:
    zone: underlay_network
    rich_rule: 'rule family="ipv4" source address="{{ docker_core_net_cidr }}" port port="8443" protocol="tcp" accept'
    state: enabled
    permanent: true
    immediate: true
  become: true
  notify: Reload Firewalld (Infra Gateways)
  tags:
    - infra_gateways
    - upsnap
    - firewall

- name: Allow Traefik to access Upsnap proxy (8443) from Docker proxy network on underlay
  ansible.posix.firewalld:
    zone: underlay_network
