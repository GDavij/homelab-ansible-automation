---
- name: Setup Internal Host DNS on /etc/hosts
  ansible.builtin.include_tasks:
    file: setup-internal-host-dns.yml

- name: Create Docker core_net for Core Infrastructure Services
  community.docker.docker_network:
    name: core_net
    state: present
    driver: bridge
    ipam_config:
      - subnet: "{{ docker_core_net_cidr }}"
        gateway: "{{ docker_core_net_gateway }}"
  become: true
  tags:
    - infra_gateways

- name: Create Docker proxy_net for Traefik Application That will be proxied
  community.docker.docker_network:
    name: proxy_net
    state: present
    driver: bridge
    ipam_config:
      - subnet: "{{ docker_proxy_net_cidr }}"
        gateway: "{{ docker_proxy_net_gateway }}"
  become: true
  tags:
    - infra_gateways

- name: Create Core Folders for Running Infrastructure Critical Services
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  become: true
  loop:
    - /opt/core/adguard
    - /opt/core/adguard/conf
    - /opt/core/adguard/work
    - /opt/core/traefik
    - /opt/core/traefik/conf
    - /opt/core/traefik/certs
    - /opt/core/traefik/dynamic
    - /opt/core/upsnap
    - /opt/core/upsnap/ssh_keys
    - /composes
  tags:
    - infra_gateways

- name: Build Traefik Dynamic Config J2 Template
  ansible.builtin.template:
    src: traefik_dynamic.gateways.yml.j2
    dest: /opt/core/traefik/dynamic/traefik-dynamic.yml
    mode: '0644'
  become: true
  tags:
    - infra_gateways

- name: Build Infrastructure Services Docker Compose
  ansible.builtin.template:
    src: infra_services.gateways.compose.yml.j2
    dest: /composes/infra_core_services.compose.yml
    mode: '0644'
  become: true
  tags:
    - infra_gateways

- name: Generate AdGuard config in conf directory (prevents setup wizard)
  ansible.builtin.template:
    src: adguard_config.gateways.yml.j2
    dest: /opt/core/adguard/conf/AdGuardHome.yaml
    owner: 999  # AdGuard default UID
    group: 999
    mode: '0644'
    force: true
  become: true
  tags:
    - infra_gateways

- name: Configure Upsnap firewall rules
  ansible.builtin.include_tasks:
    file: upsnap-firewall.yml
  tags:
    - infra_gateways
    - upsnap
    - firewall

- name: Deploy Core Infrastructure Services
  community.docker.docker_compose_v2:
    state: present
    project_src: /composes
    files:
      - infra_core_services.compose.yml
    project_name: infra_core_services
    pull: missing
    remove_orphans: true
    recreate: always
  become: true
  tags:
    - infra_gateways

- name: Verify Core Infrastructure Services are Healthy
  ansible.builtin.command:
    cmd: docker compose -f /composes/infra_core_services.compose.yml ps --format json
  register: infra_gateways_health
  changed_when: false
  retries: 6
  delay: 10
  until: "'unhealthy' not in infra_gateways_health.stdout"
  become: true
  tags:
    - infra_gateways
