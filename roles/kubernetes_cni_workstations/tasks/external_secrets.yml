---
- name: "Install External Secrets CRDs (server-side apply)"
  become: true
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/external-secrets/external-secrets/v0.12.1/deploy/crds/bundle.yaml"
    kubeconfig: /etc/kubernetes/admin.conf
    server_side_apply:
      field_manager: ansible
      force_conflicts: true

- name: "Add External Secrets Helm Repository"
  kubernetes.core.helm_repository:
    name: external-secrets
    repo_url: https://charts.external-secrets.io
  become: true

- name: "Install External Secrets Operator via Helm"
  kubernetes.core.helm:
    name: external-secrets
    chart_ref: external-secrets/external-secrets
    chart_version: "0.12.1"
    release_namespace: external-secrets
    create_namespace: true
    kubeconfig: /etc/kubernetes/admin.conf
    values:
      installCRDs: false
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      webhook:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
      certController:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
    wait: true
    timeout: "2m0s"
  become: true

- name: "Wait for ExternalSecret CRD to be Available"
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: externalsecrets.external-secrets.io
    kubeconfig: /etc/kubernetes/admin.conf
  become: true
  register: eso_crd_check
  until: eso_crd_check.resources | length > 0
  retries: 20
  delay: 5
