---
# Reflector: Replica automática de Secrets e ConfigMaps entre namespaces
# Usado para compartilhar certificados TLS e CA trust com todos os namespaces do cluster
- name: "Add Reflector Helm Repository"
  become: true
  kubernetes.core.helm_repository:
    repo_name: emberstack
    repo_url: "https://emberstack.github.io/helm-charts"
    kubeconfig: /etc/kubernetes/admin.conf

- name: "Install Reflector via Helm"
  become: true
  kubernetes.core.helm:
    name: reflector
    chart_ref: emberstack/reflector
    release_namespace: kube-system
    create_namespace: false
    kubeconfig: /etc/kubernetes/admin.conf
    wait: true
    wait_timeout: "120s"
