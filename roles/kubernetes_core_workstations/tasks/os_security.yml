---
- name: Ansible Set Permissive Mode for SELinux
  ansible.builtin.command:
    cmd: setenforce 0
  changed_when: false
  become: true

- name: Ansible Update SELinux Config to Permissive
  ansible.builtin.lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX=.*'
    line: 'SELINUX=permissive'
  changed_when: false
  become: true
