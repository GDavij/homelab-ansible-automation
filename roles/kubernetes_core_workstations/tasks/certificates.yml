---
- name: Ensure that PKI Kubernetes Folder Exists
  ansible.builtin.file:
    path: /etc/kubernetes/pki
    state: directory
    mode: "0755"
  become: true

- name: Inject Root CA and Front-Proxy (Secure Way)
  ansible.builtin.copy:
    src: "{{ pki_output_folder }}/authorities/{{ item.src }}"
    dest: "/etc/kubernetes/pki/{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: "root-ca.crt", dest: "ca.crt", mode: "0644" }
    - { src: "root-ca.key", dest: "ca.key", mode: "0600" }
    - { src: "root-ca.crt", dest: "front-proxy-ca.crt", mode: "0644" }
    - { src: "root-ca.key", dest: "front-proxy-ca.key", mode: "0600" }
  become: true
