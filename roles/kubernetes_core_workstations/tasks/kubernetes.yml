---
- name: Import Kubernetes Repo and GPG Key using Yum
  ansible.builtin.yum_repository:
    name: kubernetes
    description: Kubernetes K8s Repo
    baseurl:
      - https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/
    enabled: true
    gpgcheck: true
    gpgkey:
      - https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/repodata/repomd.xml.key
  become: true

- name: Update Cache after Kubernetes Repo addiction
  ansible.builtin.dnf:
    update_cache: true
  become: true

- name: Install Kubernetes Packages
  ansible.builtin.dnf:
    name:
      - kubelet
      - kubeadm
      - kubectl
  become: true

- name: Check if Kubernetes Cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubernetes_core_workstations_admin_conf
  become: true

- name: Ensure Kubelet is Enabled (stopped before first init, started on re-runs)
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: "{{ 'stopped' if not kubernetes_core_workstations_admin_conf.stat.exists else 'started' }}"
  become: true

- name: Build KubeAdm Manifest from Template
  ansible.builtin.template:
    src: kubeadm_init.k8s.yml.j2
    dest: "/tmp/kubeadm-init.yaml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'
  become: true

- name: Pull Kubernetes Base Images (Control Plane)
  ansible.builtin.command:
    cmd: kubeadm config images pull
  register: kubernetes_core_workstations_kubeadm_pull_res
  changed_when: "'Image pull complete' in kubernetes_core_workstations_kubeadm_pull_res.stdout"
  become: true

- name: Install Kubernetes Python SDK for Ansible Module Support
  ansible.builtin.pip:
    name: kubernetes
    state: present
  become: true

- name: Initialize Kubernetes Cluster
  become: true
  block:
    - name: Initialize Cluster (Kubeadm Init)
      ansible.builtin.command:
        cmd: >
          kubeadm init
          --config=/tmp/kubeadm-init.yaml
          --upload-certs
          --ignore-preflight-errors=Swap
      args:
        creates: /etc/kubernetes/admin.conf
      register: kubernetes_core_workstations_kubeadm_init_res

    - name: Regenerate admin.conf if CA was rotated (re-runs)
      ansible.builtin.command:
        cmd: >
          kubeadm init phase kubeconfig admin
          --config=/tmp/kubeadm-init.yaml
      when: kubernetes_core_workstations_admin_conf.stat.exists
      register: kubernetes_core_workstations_kubeconfig_regen
      changed_when: kubernetes_core_workstations_kubeconfig_regen.rc == 0

    - name: Approve Kubelet CSR
      ansible.builtin.shell: |
        set -o pipefail

        # Wait API Server be Ready to protect from any I/O Storm (30s timeout)
        timeout 30s bash -c 'until kubectl get csr --kubeconfig=/etc/kubernetes/admin.conf; do sleep 2; done'

        # Approve all pending CSRs (if any) to allow Kubelet to start healthy and avoid I/O Storms in the first minutes of the cluster
        CSRS=$(kubectl get csr --kubeconfig=/etc/kubernetes/admin.conf | grep Pending | awk '{ print $1 }')
        if [ -n "$CSRS" ]; then
          for csr in $CSRS; do
            kubectl certificate approve $csr --kubeconfig=/etc/kubernetes/admin.conf
          done
        fi
      register: kubernetes_core_workstations_csr_approval
      changed_when: "'approved' in kubernetes_core_workstations_csr_approval.stdout"

    - name: Wait for Node to Register in API Server
      ansible.builtin.command:
        cmd: kubectl get node {{ node_hostname }} --kubeconfig=/etc/kubernetes/admin.conf
      register: kubernetes_core_workstations_node_ready
      changed_when: false
      until: kubernetes_core_workstations_node_ready.rc == 0
      retries: 30
      delay: 10

    - name: Allow Control Plane Scheduling (Untaint Master)
      kubernetes.core.k8s_taint:
        state: absent
        name: "{{ node_hostname }}"
        kubeconfig: /etc/kubernetes/admin.conf
        taints:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
