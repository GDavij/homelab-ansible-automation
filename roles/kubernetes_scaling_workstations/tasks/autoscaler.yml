---
- name: Clone Kubernetes Autoscaler Repo
  become: true
  ansible.builtin.git:
    repo: "https://github.com/kubernetes/autoscaler.git"
    version: "cluster-autoscaler-release-1.35"
    dest: "/opt/autoscaler"
    force: true

- name: Execute VPA Utility Script
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  become: true
  ansible.builtin.command:
    cmd: "./hack/vpa-up.sh"
    chdir: /opt/autoscaler/vertical-pod-autoscaler
  register: kubernetes_scaling_workstations_vpa_install
  changed_when: "'already exists' not in kubernetes_scaling_workstations_vpa_install.stderr"
  failed_when:
    - kubernetes_scaling_workstations_vpa_install.rc != 0
    - "'already exists' not in kubernetes_scaling_workstations_vpa_install.stderr"
