---
- name: Ensure Longhorn Storage Directories Exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  become: true
  loop:
    - /var/lib/longhorn
    - /cold-storage/longhorn

- name: Install Longhorn System
  become: true
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/longhorn/longhorn/v1.7.2/deploy/longhorn.yaml"
    kubeconfig: /etc/kubernetes/admin.conf

- name: Copy Storage Manifests to Workstation
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/tmp/{{ item }}"
    mode: '0644'
  become: true
  loop:
    - longhorn_storage.k8s.yml
    - longhorn_node.k8s.yml

- name: Apply Storage Classes Manifest
  become: true
  kubernetes.core.k8s:
    state: present
    src: /tmp/longhorn_storage.k8s.yml
    kubeconfig: /etc/kubernetes/admin.conf

- name: Wait for Longhorn Node CRD to be created
  become: true
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: nodes.longhorn.io
    kubeconfig: /etc/kubernetes/admin.conf
    wait: true
    wait_timeout: 120

- name: Wait for Longhorn Node CRD to be established
  become: true
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: nodes.longhorn.io
    kubeconfig: /etc/kubernetes/admin.conf
    wait: true
    wait_condition:
      type: Established
      status: "True"
    wait_timeout: 60

- name: Wait for Longhorn Admission Webhook to be Ready
  become: true
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: longhorn-admission-webhook
    namespace: longhorn-system
    kubeconfig: /etc/kubernetes/admin.conf
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 180

- name: Apply Longhorn Node Manifest (SSD & HDD)
  become: true
  kubernetes.core.k8s:
    state: present
    src: /tmp/longhorn_node.k8s.yml
    kubeconfig: /etc/kubernetes/admin.conf
