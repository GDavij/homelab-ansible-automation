---
- name: Ensure Longhorn Storage Directories Exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  become: true
  loop:
    - /k8s_storage
    - /cold-storage/longhorn

- name: Install Longhorn System
  become: true
  kubernetes.core.k8s:
    state: present
    src: "https://raw.githubusercontent.com/longhorn/longhorn/v1.7.2/deploy/longhorn.yaml"
    kubeconfig: /etc/kubernetes/admin.conf

- name: Disable Longhorn Default Disk Auto-Creation
  become: true
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/kubernetes/admin.conf
    definition:
      apiVersion: longhorn.io/v1beta2
      kind: Setting
      metadata:
        name: create-default-disk-labeled-nodes
        namespace: longhorn-system
      value: "true"

- name: Copy Storage Manifests to Workstation
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/tmp/{{ item }}"
    mode: '0644'
  become: true
  loop:
    - longhorn_storage.k8s.yml
    - longhorn_node.k8s.yml

- name: Apply Storage Classes Manifest
  become: true
  kubernetes.core.k8s:
    state: present
    src: /tmp/longhorn_storage.k8s.yml
    kubeconfig: /etc/kubernetes/admin.conf

- name: Wait for Longhorn Node CRD to be created
  become: true
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: nodes.longhorn.io
    kubeconfig: /etc/kubernetes/admin.conf
    wait: true
    wait_timeout: 120

- name: Wait for Longhorn Node CRD to be established
  become: true
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: nodes.longhorn.io
    kubeconfig: /etc/kubernetes/admin.conf
    wait: true
    wait_condition:
      type: Established
      status: "True"
    wait_timeout: 60

- name: Wait for Longhorn Manager to be Ready (includes admission webhook)
  become: true
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: DaemonSet
    name: longhorn-manager
    namespace: longhorn-system
    kubeconfig: /etc/kubernetes/admin.conf
  register: kubernetes_storage_workstations_longhorn_manager
  until:
    - kubernetes_storage_workstations_longhorn_manager.resources | length > 0
    - kubernetes_storage_workstations_longhorn_manager.resources[0].status.numberReady | default(0) > 0
    - kubernetes_storage_workstations_longhorn_manager.resources[0].status.numberReady == kubernetes_storage_workstations_longhorn_manager.resources[0].status.desiredNumberScheduled
  retries: 30
  delay: 10

- name: Apply Longhorn Node Manifest (SSD & HDD)
  become: true
  kubernetes.core.k8s:
    state: present
    src: /tmp/longhorn_node.k8s.yml
    kubeconfig: /etc/kubernetes/admin.conf

- name: Remove Longhorn Auto-Created Default Disk (conflicts with custom disks)
  become: true
  ansible.builtin.shell: |
    set -o pipefail
    KUBECONFIG=/etc/kubernetes/admin.conf
    export KUBECONFIG

    DISK_KEYS=$(kubectl get nodes.longhorn.io monster-workstation \
      -n longhorn-system -o json | python3 -c "
    import sys, json
    data = json.load(sys.stdin)
    disks = data.get('spec', {}).get('disks', {})
    for k in disks:
        if k.startswith('default-disk'):
            print(k)
    ")

    if [ -n "$DISK_KEYS" ]; then
      for key in $DISK_KEYS; do
        # Step 1: Disable scheduling and request eviction
        kubectl patch nodes.longhorn.io monster-workstation \
          -n longhorn-system --type=merge \
          -p="{\"spec\":{\"disks\":{\"$key\":{\"allowScheduling\":false,\"evictionRequested\":true}}}}"
        sleep 5
        # Step 2: Remove the disk
        kubectl patch nodes.longhorn.io monster-workstation \
          -n longhorn-system --type=json \
          -p="[{\"op\": \"remove\", \"path\": \"/spec/disks/$key\"}]"
      done
      echo "CHANGED: removed default disk(s)"
    else
      echo "OK: no default disks found"
    fi
  register: kubernetes_storage_workstations_default_disk_removal
  changed_when: "'CHANGED' in kubernetes_storage_workstations_default_disk_removal.stdout"
