---
k8s_workstation_services:
  - name: traefik Ingress Controller HTTPS
    description: "Port for Traefik Ingress Controller HTTPS traffic"
    port: "443/tcp"


# node_name is defined per-host in host_vars/<hostname>/identity.yml
node_hostname: "{{ node_name }}-workstation"
cluster_domain: "k8s.{{ node_name }}.lab"
cluster_endpoint: "https://nlb.{{ cluster_domain }}"
kubernetes_version: "1.35"

nlb_cluster_hostname: "nlb.{{ cluster_domain }}"

# K8s services exposed via IngressRoute (Traefik)
# Each entry generates: IngressRoute + ServersTransport
# External FQDN follows the pattern: <service>.svc.<cluster_domain>
k8s_ingress_services:
  - name: argocd-server
    namespace: argocd
    port: 443
    tcp_passthrough: true  # ArgoCD uses its own TLS + gRPC, passthrough via HostSNI
  - name: hubble-ui
    namespace: kube-system
    port: 80
    insecure_backend: false
  - name: vault
    namespace: security
    port: 8200
    insecure_backend: false
  - name: gitea
    namespace: ci-cd
    port: 3000
  - name: drone
    namespace: ci-cd
    port: 80
  - name: coder
    namespace: ci-cd
    port: 3000
  - name: langfuse
    namespace: observability
    port: 3000
  - name: mlflow
    namespace: observability
    port: 5000
  - name: ollama
    namespace: ai-services
    port: 11434
  - name: comfyui
    namespace: ai-services
    port: 8188
  - name: qdrant
    namespace: database
    port: 6333
  - name: rabbitmq
    namespace: stack
    port: 15672
  - name: minio
    namespace: storage
    port: 9001
  - name: minio-api
    namespace: storage
    port: 9000
    service_name: minio  # Routes to minio service, not minio-api
    dns_override: "s3"   # s3.svc.k8s.monster.lab

# ArgoCD GitOps Configuration
argocd_gitops_repo: "https://github.com/GDavij/homelab-gitops-k8s-cluster.git"
argocd_gitops_revision: "main"
argocd_gitops_path: "."
