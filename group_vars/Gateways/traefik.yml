---
http_routers:
  - name: adguard
    rule: "Host(`dns.lab`)"
    entryPoints:
      - websecure
    mtls: true
    service:
      loadBalancer:
        servers:
          - url: "https://dns:8443"
    tls:
      passthrough: false

  - name: traefik
    rule: "Host(`gateway.lab`)"
    entryPoints:
      - websecure
    mtls: true
    internal: true
    service:
    tls:
      passthrough: false

  - name: upsnap
    rule: "Host(`snap.lab`)"
    entryPoints:
      - websecure
    mtls: true
    service:
      loadBalancer:
        servers:
          - url: "https://192.168.1.77:8443"
    tls:
      passthrough: false

  - name: memos
    rule: "Host(`daily.lab`)"
    entryPoints:
      - websecure
    mtls: true
    service:
      loadBalancer:
        servers:
          - url: "https://memos:8443"
    tls:
      passthrough: false

  - name: sure-finance
    rule: "Host(`finance.lab`)"
    entryPoints:
      - websecure
    mtls: true
    service:
      loadBalancer:
        servers:
          - url: "https://sure-finance:8443"
    tls:
      passthrough: false

  - name: trilium
    rule: "Host(`brain.lab`)"
    entryPoints:
      - websecure
    mtls: true
    service:
      loadBalancer:
        servers:
          - url: "https://trilium:8443"
    tls:
      passthrough: false

tcp_routers:
  - name: K8s-cluster-api-server
    rule: "HostSNI(`nlb.k8s.monster.lab`)"
    entryPoints:
      - websecure
    mtls: false
    service:
      loadBalancer:
        servers:
          - address: "192.168.1.50:6443"
    tls:
      passthrough: true
      options: k8s-api-server

  - name: K8s-cluster-ingress
    rule: "HostSNI(`*`)"
    entryPoints:
      - websecure
    mtls: false
    service:
      loadBalancer:
        servers:
          - address: "k8s.monster.internal:443"
    tls:
      passthrough: true
      options: k8s-api-server
