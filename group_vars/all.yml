---
default_timezone: "America/Sao_Paulo"

default_locales:
  - "en_US.UTF-8"
  - "pt_BR.UTF-8"

default_locale: "en_US.UTF-8"

# PKI Configuration
pki_output_folder: "{{ playbook_dir }}/.pki_output/"
pki_ca_common_name: "lab"
pki_ca_organization: "Homelab"
pki_ca_organizational_unit: "IT Department"
pki_ca_country: "BR"
pki_ca_state: "Sao_Paulo"
pki_ca_locality: "Franca"
pki_ca_email: "admin@lab"

pki_services:
  - name: adguard
    dns: "dns.lab"
    description: DNS Authority
    ip: "{{ gateway_core_station_ip }}"

  - name: traefik
    dns: gateway.lab
    description: Gateway Proxy
    credential_certificate: true
    ip: "{{ gateway_core_station_ip }}"

  - name: upsnap
    dns: snap.lab
    description: Wakeup on Lan Host
    ip: "{{ gateway_core_station_ip }}"

  - name: memos
    dns: daily.lab
    description: Memos Host, Fleeting Notes/Daily Journal
    ip: "{{ gateway_core_station_ip }}"

  - name: sure-finance
    dns: finance.lab
    description: Sure Finance Host, Financial Control
    ip: "{{ gateway_core_station_ip }}"

  - name: trilium
    dns: brain.lab
    description: Trilium Host, Personal Knowledge Base
    ip: "{{ gateway_core_station_ip }}"

  - name: kubernetes-ingress-traefik
    dns: "*.k8s.monster.lab"
    dns_alt:
      - "argocd-server.argocd.svc.k8s.monster.lab"
      - "hubble-ui.kube-system.svc.k8s.monster.lab"
    description: Kubernetes Ingress Controller (Traefik)
    ip: "{{ workstation_core_station_ip }}"

# SSH Key Management
ssh_keys_dir: "{{ playbook_dir }}/.ssh_keys/{{ inventory_hostname }}"
local_keys_dir: "{{ ssh_keys_dir }}"

# Client Devices for mTLS Authentication
pki_client_devices:
  - name: controller
    common_name: "Controller Arch Linux Notebook"
    description: "Controller Client Certificate"
    user: "gdavij"

  - name: cellphone
    common_name: "Mobile Device Certificate"
    description: "Cellphone Client Certificate"
    user: "gdavij"

docker_install_compose_plugin: true
docker_compose_package_state: present

enable_tailscale: false

# Shared Network Configuration
subnet_cidr: "{{ network_subnet_cidr }}"

# Docker Network CIDRs (used by gateway Docker Compose services)
docker_core_net_cidr: "172.20.0.0/24"
docker_core_net_gateway: "172.20.0.1"
docker_proxy_net_cidr: "172.21.0.0/24"
docker_proxy_net_gateway: "172.21.0.1"

# Traefik version (shared between gateway Docker Compose and K8s ingress)
traefik_version: "v3.6.6"
